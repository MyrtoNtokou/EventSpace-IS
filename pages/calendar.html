<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Ημερολόγιο - EventSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/calendarStyle.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="homepage.html" class="nav-item" title="Αρχική"><img src="../icons/home.svg" class="nav-icon"></a>
        <a href="calendar.html" class="nav-item active" title="Ημερολόγιο"><img src="../icons/calendar.svg" class="nav-icon"></a>
        <a href="requests.html" class="nav-item" title="Αιτήματα"><img src="../icons/request.svg" class="nav-icon"></a>
        <a href="calculator.html" class="nav-item" title="Υπολογισμός Προσφοράς"><img src="../icons/calculator.svg" class="nav-icon"></a>
        
        <div class="user-menu-container" style="margin-top: auto;">
            <div id="logout-popover" class="logout-popover hidden">
                <button onclick="handleLogout()" class="logout-btn">Έξοδος</button>
            </div>
            <div class="nav-item" onclick="toggleLogoutMenu(event)" title="Λογαριασμός" style="cursor:pointer; margin-bottom:0;">
                <img src="../icons/account.svg" class="nav-icon">
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="calendar-card">
            <!-- Header Ημερολογίου -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="monthDisplay" class="m-0" style="color: var(--accent-dark-color); font-weight: 700;">Μάιος 2026</h2>
                    <div>
                        <button class="btn-today" onclick="goToToday()">Σήμερα</button>
                        <button class="btn-nav" onclick="changeMonth(-1)">&#10094;</button>
                        <button class="btn-nav" onclick="changeMonth(1)">&#10095;</button>
                    </div>
            </div>

            <!-- Επικεφαλίδες Ημερών -->
            <div class="row g-0 text-center day-headers">
                <div class="col">Δευ</div>
                <div class="col">Τρι</div>
                <div class="col">Τετ</div>
                <div class="col">Πεμ</div>
                <div class="col">Παρ</div>
                <div class="col">Σαβ</div>
                <div class="col">Κυρ</div>
            </div>

            <!-- Το πλέγμα των ημερών θα μπει εδώ από τη JS -->
            <div id="calendarGrid" class="row g-0"></div>
        </div>
    </div>

    <div id="eventModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle">Στοιχεία Εκδήλωσης</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            
            <div class="modal-body-scroll">
                <form id="eventForm">
                    <!-- Βασικά Στοιχεία -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>ΟΝΟΜΑ ΦΟΡΕΑ</label>
                            <input type="text" id="providerName">
                        </div>
                        <div class="form-group">
                            <label>ΕΙΔΟΣ ΦΟΡΕΑ</label>
                            <select id="providerType" class="input-select">
                                <option value="" disabled selected>Επιλέξτε είδος...</option>
                                <option value="mko">ΜΚΟ</option>
                                <option value="sme">Μικρομεσαία Επιχείρηση</option>
                                <option value="large">Μεγάλη Επιχείρηση</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>ΗΜΕΡΟΜΗΝΙΑ</label>
                            <input type="text" id="eventDate" readonly>
                        </div>
                        <div class="form-group">
                            <label>ΩΡΑ</label>
                            <input type="text" class="form-control" id="timeFrom" name="timeFrom" required>
                        </div>
                    </div>

                    <div class="form-row align-center">
                        <div class="form-group">
                            <label>ΑΡΙΘΜΟΣ ΑΤΟΜΩΝ</label>
                            <input type="number" class="form-control" id="peopleCount" name="peopleCount" min="1" max="70" required>
                        </div>
                        <div class="form-group check-group">
                            <label>MINI HUB</label>
                            <input type="checkbox" class="custom-tick" id="childCare">
                        </div>
                    </div>

                    <!-- Στοιχεία Επικοινωνίας -->
                    <h3 class="section-divider">Στοιχεία Επικοινωνίας</h3>
                    <div class="form-group">
                        <label>ΟΝΟΜΑΤΕΠΩΝΥΜΟ ΥΠΕΥΘΥΝΟΥ</label>
                        <input type="text" id="contactName">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ΤΗΛΕΦΩΝΟ</label>
                            <input type="tel" id="contactPhone">
                        </div>
                        <div class="form-group">
                            <label>EMAIL</label>
                            <input type="email" id="contactEmail">
                        </div>
                    </div>

                    <!-- Λεπτομέρειες & Διάταξη -->
                    <h3 class="section-divider">Λεπτομέρειες</h3>
                    <div class="details-grid">
                        <div class="details-column">
                            <label>ΔΙΑΤΑΞΗ</label>
                            <label class="check-item"><input type="radio" name="layout" value="theatrical"> Θεατρική</label>
                            <label class="check-item"><input type="radio" name="layout" value="circle"> Κύκλος</label>
                            <label class="check-item"><input type="radio" name="layout" value="p-shape"> Π με τραπέζια</label>
                            <label class="check-item"><input type="radio" name="layout" value="school"> Σχολική</label>
                        </div>
                        <div class="details-column">
                            <label>ΕΞΟΠΛΙΣΜΟΣ / ΠΑΡΟΧΕΣ</label>
                            <label class="check-item"><input type="checkbox" value="monitor"> Μόνιτορ</label>
                            <label class="check-item"><input type="checkbox" value="mic"> Μικροφωνική</label>
                            <label class="check-item"><input type="checkbox" value="catering"> Catering</label>
                            <label class="check-item"><input type="checkbox" value="desk"> Registration Desk</label>
                        </div>
                    </div>
                    <!-- Προσθήκη Σχολίων πριν το Footer -->
                    <h3 class="section-divider">Επιπλέον Σημειώσεις</h3>
                    <div class="form-group">
                        <label>ΣΧΟΛΙΑ</label>
                        <textarea id="eventComments" rows="3" style="width: 100%; border: 2px solid #f0f0f0; border-radius: 15px; padding: 12px;"></textarea>
                    </div>

                    <div class="modal-footer">
                            <button type="button" class="btn-secondary" onclick="closeModal()">Ακύρωση</button>
                            <button type="submit" class="btn-primary">Αποθήκευση</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/calendarScript.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
