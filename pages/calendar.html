<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Ημερολόγιο - EventSpace</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/calendarStyle.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="homepage.html" class="nav-item" title="Αρχική"><img src="../icons/home.svg" class="nav-icon"></a>
        <a href="calendar.html" class="nav-item active" title="Ημερολόγιο"><img src="../icons/calendar.svg" class="nav-icon"></a>
        <a href="requests.html" class="nav-item" title="Αιτήματα"><img src="../icons/request.svg" class="nav-icon"></a>
        <a href="calculator.html" class="nav-item" title="Υπολογισμός Προσφοράς"><img src="../icons/calculator.svg" class="nav-icon"></a>
        
        <div class="user-menu-container" style="margin-top: auto;">
            <div id="logout-popover" class="logout-popover hidden">
                <button onclick="handleLogout()" class="logout-btn">Έξοδος</button>
            </div>
            <div class="nav-item" onclick="toggleLogoutMenu(event)" title="Λογαριασμός" style="cursor:pointer; margin-bottom:0;">
                <img src="../icons/account.svg" class="nav-icon">
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="calendar-card">
            <!-- Header Ημερολογίου -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="monthDisplay" class="m-0" style="color: var(--accent-dark-color); font-weight: 700;">Μάιος 2026</h2>
                <div>
                    <button class="btn-nav" onclick="changeMonth(-1)">&#10094;</button>
                    <button class="btn-nav" onclick="changeMonth(1)">&#10095;</button>
                </div>
            </div>

            <!-- Επικεφαλίδες Ημερών -->
            <div class="row g-0 text-center day-headers">
                <div class="col">Δευ</div>
                <div class="col">Τρι</div>
                <div class="col">Τετ</div>
                <div class="col">Πεμ</div>
                <div class="col">Παρ</div>
                <div class="col">Σαβ</div>
                <div class="col">Κυρ</div>
            </div>

            <!-- Το πλέγμα των ημερών θα μπει εδώ από τη JS -->
            <div id="calendarGrid" class="row g-0"></div>
        </div>
    </div>

    <script src="../js/calendarScript.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
