<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calendar Full</title>
    <style>
        :root {
            --bg-color: #f1f0ea; /* Το κρεμ φόντο */
            --card-bg: #ffffff;
            --text-main: #2d2d2d;
            --accent-soft: #f8e7eb; 
            --btn-green: #e8f7f0;
            --btn-red: #fcecee;
            --text-green: #52b788;
            --text-red: #e63946;
            --border-ui: #eeeeee;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Στενή μπάρα */
        .sidebar {
            width: 80px;
            background: white;
            margin: 20px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .side-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .side-icon.active {
            background-color: var(--accent-soft);
        }

        /* Κεντρικό Panel Ημερολογίου */
        .main-container {
            flex-grow: 1;
            margin: 20px 20px 20px 0;
            background: white;
            border-radius: 45px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .month-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: var(--bg-color);
        }

        /* Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
            border: 1px solid var(--border-ui);
            border-radius: 25px;
            overflow: hidden;
            background-color: var(--border-ui);
            gap: 1px;
        }

        .day-cell {
            background: white;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .day-cell:hover {
            background: #fdfdfd;
        }

        .day-num {
            font-size: 18px;
            font-weight: 600;
            color: #888;
        }

        .day-cell.current-month .day-num {
            color: var(--text-main);
        }

        /* Event Pills */
        .event-pill {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pill-green { background: var(--btn-green); color: var(--text-green); }
        .pill-yellow { background: #fff9db; color: #f08c00; }

        /* Modal Details */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(241, 240, 234, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 450px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: left;
        }

        .close-btn {
            background: var(--btn-red);
            color: var(--text-red);
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-icon">🏠</div>
        <div class="side-icon active">📅</div>
        <div class="side-icon">⚙️</div>
        <div style="margin-top: auto;" class="side-icon">👤</div>
    </div>

    <div class="main-container">
        <div class="calendar-header">
            <div class="month-title" id="monthLabel">Μάιος 2026</div>
            <div class="nav-controls">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            </div>
    </div>

    <div id="eventModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalDateTitle" style="margin-top:0">Λεπτομέρειες</h2>
            <div id="modalData"></div>
            <button class="close-btn" onclick="closeModal()">Κλείσιμο</button>
        </div>
    </div>

    <script>
        let viewDate = new Date(2026, 4, 1); // Μάιος 2026
        
        // Demo Δεδομένα
        const mockEvents = {
            "2026-04-15": [{ title: "Γιάννης Παπαδόπουλος", type: "pill-green", info: "Ιδιώτης • 18:00" }],
            "2026-04-01": [{ title: "Εταιρεία BCD", type: "pill-green", info: "Εταιρεία • 10:30" }, { title: "Εκκρεμότητα", type: "pill-yellow", info: "Τιμολόγηση" }],
            "2026-04-07": [{ title: "Εταιρεία ABC", type: "pill-green", info: "Project Launch" }]
        };

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const label = document.getElementById('monthLabel');
            grid.innerHTML = '';

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const monthNames = ["Ιανουάριος", "Φεβρουάριος", "Μάρτιος", "Απρίλιος", "Μάιος", "Ιούνιος", "Ιούλιος", "Αύγουστος", "Σεπτέμβριος", "Οκτώβριος", "Νοέμβριος", "Δεκέμβριος"];
            
            label.innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Υπολογισμός offset (Δευτέρα ως πρώτη μέρα)
            const offset = (firstDay === 0) ? 6 : firstDay - 1;

            // Κενά προηγούμενου μήνα
            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell';
                empty.style.background = '#f9f9f9';
                grid.appendChild(empty);
            }

            // Ημέρες τρέχοντος μήνα
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell current-month';
                cell.onclick = () => openModal(dateStr, d, monthNames[month]);

                let html = `<div class="day-num">${d}</div>`;
                
                if (mockEvents[dateStr]) {
                    mockEvents[dateStr].forEach(ev => {
                        html += `<div class="event-pill ${ev.type}">${ev.title}</div>`;
                    });
                }
                
                cell.innerHTML = html;
                grid.appendChild(cell);
            }
        }

        function changeMonth(dir) {
            viewDate.setMonth(viewDate.getMonth() + dir);
            renderCalendar();
        }

        function openModal(dateStr, day, monthName) {
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('modalDateTitle');
            const data = document.getElementById('modalData');

            title.innerText = `${day} ${monthName}`;
            
            if (mockEvents[dateStr]) {
                data.innerHTML = mockEvents[dateStr].map(ev => `
                    <div style="margin-bottom:20px; padding:15px; background:#f9f9f9; border-radius:20px;">
                        <strong style="color:var(--text-green)">${ev.title}</strong><br>
                        <span style="font-size:14px; color:#666">${ev.info}</span>
                    </div>
                `).join('');
            } else {
                data.innerHTML = "<p>Καμία προγραμματισμένη εκδήλωση.</p>";
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        renderCalendar();
    </script>
</body>
</html>
