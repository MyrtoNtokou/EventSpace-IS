<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φόρμα Εκδήλωσης</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5" style="max-width: 800px;">
    <form id="eventForm">
        <div class="form-box">
            <h3 class="mb-4 text-center text-primary">ΦΟΡΜΑ ΣΥΜΠΛΗΡΩΣΗΣ ΣΤΟΙΧΕΙΩΝ</h3>
            
            <div class="mb-3">
                <label for="orgName" class="form-label">Ονοματεπώνυμο φορέα/ιδιώτη:</label>
                <input type="text" class="form-control" id="orgName" name="orgName" required>
            </div>
            
            <div class="mb-3">
                <label for="orgType" class="form-label">Είδος φορέα:</label>
                <select class="form-select" id="orgType" name="orgType" required>
                    <option value="">-- Επίλεξε Είδος Φορέα --</option>
                    <option value="1">ΜΚΟ</option>
                    <option value="2">Μικρομεσαία επιχείρηση</option>
                    <option value="3">Μεγάλη επιχείρηση</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="eventDate" class="form-label">Ημερομηνία εκδήλωσης:</label>
                <input type="date" class="form-control" id="eventDate" name="eventDate" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Ώρα διάρκειας (09:30 - 19:00):</label>
                <div class="row g-3 align-items-center">
                    <div class="col-auto">
                        <label for="timeFrom" class="col-form-label">Από</label>
                    </div>
                    <div class="col-auto">
                        <input type="time" class="form-control" id="timeFrom" name="timeFrom" min="09:30" max="19:00" required>
                    </div>
                    <div class="col-auto">
                        <label for="timeTo" class="col-form-label">Μέχρι</label>
                    </div>
                    <div class="col-auto">
                        <input type="time" class="form-control" id="timeTo" name="timeTo" min="09:30" max="19:00" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="peopleCount" class="form-label">Αριθμός ατόμων (έως 70):</label>
                <input type="number" class="form-control" id="peopleCount" name="peopleCount" min="1" max="70" step="1" required>
            </div>

            <div class="mb-3">
                <label for="eventDescription" class="form-label">Σύντομη περιγραφή εκδήλωσης:</label>
                <textarea class="form-control" id="eventDescription" name="eventDescription" rows="3" required></textarea>
            </div>
            
            <div class="mb-3 mt-4">
                <label class="form-label fw-bold d-block">Επιτήρηση παιδιών κατά τη διάρκεια της εκδήλωσης;</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="supervision" id="supervisionYes" value="yes">
                    <label class="form-check-label" for="supervisionYes">ΝΑΙ</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="supervision" id="supervisionNo" value="no" checked>
                    <label class="form-check-label" for="supervisionNo">ΟΧΙ</label>
                </div>
            </div>

            <hr class="my-5">
            <h5 class="mb-4 text-primary">ΣΤΟΙΧΕΙΑ ΕΠΙΚΟΙΝΩΝΙΑΣ</h5>

            <div class="mb-3">
                <label for="contactName" class="form-label">Ονοματεπώνυμο:</label>
                <input type="text" class="form-control" id="contactName" name="contactName" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Ηλεκτρονική διεύθυνση / email:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <div class="mb-3">
                <label for="phone" class="form-label">Τηλέφωνο επικοινωνίας:</label>
                <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10}" maxlength="10" title="Το τηλέφωνο πρέπει να αποτελείται ακριβώς από 10 ψηφία" required>
            </div>

        </div> 

        <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary" id="submitBtn">Υποβολή αιτήματος</button>
        </div>
    </form>
</div>

<script src="../javascript/script.js"></script>

</body>
</html>
