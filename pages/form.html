<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φόρμα Εκδήλωσης</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-box {
            border: 2px solid #aeb5be;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            background-color: #fcfcfc;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5" style="max-width: 800px;">
    <form id="eventForm">
        <div class="form-box">
            <h3 class="mb-4 text-center text-primary">ΦΟΡΜΑ ΣΥΜΠΛΗΡΩΣΗΣ ΣΤΟΙΧΕΙΩΝ</h3>
            
            <div class="mb-3">
                <label for="fullName" class="form-label">Ονοματεπώνυμο φορέα:</label>
                <input type="text" class="form-control" id="fullName" name="fullName">
            </div>
            
            <div class="mb-3">
                <label for="eventType" class="form-label">Τύπος εκδήλωσης:</label>
                <input type="text" class="form-control" id="eventType" name="eventType">
            </div>
            
            <div class="mb-3">
                <label for="eventDate" class="form-label">Ημερομηνία διοργάνωσης εκδήλωσης:</label>
                <input type="date" class="form-control" id="eventDate" name="eventDate">
            </div>

            <div class="mb-3">
                <label class="form-label">Ώρα διάρκειας εκδήλωσης:</label>
                <div class="row g-3 align-items-center">
                    <div class="col-auto">
                        <label for="timeFrom" class="col-form-label">Από</label>
                    </div>
                    <div class="col-auto">
                        <input type="time" class="form-control" id="timeFrom" name="timeFrom">
                    </div>
                    <div class="col-auto">
                        <label for="timeTo" class="col-form-label">Μέχρι</label>
                    </div>
                    <div class="col-auto">
                        <input type="time" class="form-control" id="timeTo" name="timeTo">
                    </div>
                </div>
            </div>
            
            <div class="mb-3 mt-3">
                <label for="room" class="form-label">Επιλογή αίθουσας εκδήλωσης:</label>
                <select class="form-select" id="room" name="room">
                    <option value="">-- Επίλεξε Αίθουσα --</option>
                    <option value="1">Αίθουσα 1 (Μικρή)</option>
                    <option value="2">Αίθουσα 2 (Μεγάλη)</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Ηλεκτρονική διεύθυνση / email:</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            
            <div class="mb-3">
                <label for="phone" class="form-label">Τηλέφωνο επικοινωνίας:</label>
                <input type="tel" class="form-control" id="phone" name="phone">
            </div>
            
            <div class="mb-3 mt-4">
                <label class="form-label fw-bold d-block">Επιτήρηση παιδιών κατά τη διάρκεια της εκδήλωσης;</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="supervision" id="supervisionYes" value="yes">
                    <label class="form-check-label" for="supervisionYes">ΝΑΙ</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="supervision" id="supervisionNo" value="no" checked>
                    <label class="form-check-label" for="supervisionNo">ΟΧΙ</label>
                </div>
            </div>

            <div class="mb-4">
                <label for="childrenCount" class="form-label">* Αριθμός παιδιών:</label>
                <input type="number" class="form-control" id="childrenCount" name="childrenCount" disabled>
            </div>
        </div> 

        <div class="d-flex justify-content-end gap-3 mt-4">
            <button type="button" class="btn btn-outline-secondary" id="saveDraftBtn">Προσωρινή αποθήκευση</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Υποβολή αιτήματος</button>
        </div>
    </form>
</div>

<script>
    const radioYes = document.getElementById('supervisionYes');
    const radioNo = document.getElementById('supervisionNo');
    const childrenInput = document.getElementById('childrenCount');

    function checkSupervision() {
        if (radioYes.checked) {
            childrenInput.disabled = false;
        } else {
            childrenInput.disabled = true;
            childrenInput.value = '';
        }
    }

    radioYes.addEventListener('change', checkSupervision);
    radioNo.addEventListener('change', checkSupervision);

    document.getElementById('saveDraftBtn').addEventListener('click', function() {
        alert('Η φόρμα αποθηκεύτηκε προσωρινά!');
    });

    document.getElementById('eventForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        alert('Το αίτημά σας στάλθηκε με επιτυχία!');
    });
</script>

</body>
</html>
