<!DOCTYPE html>

<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/calculator.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="homepage.html" class="nav-item" title="Αρχική"><img src="../icons/home.svg" class="nav-icon"></a>
        <a href="calendar.html" class="nav-item" title="Ημερολόγιο"><img src="../icons/calendar.svg" class="nav-icon"></a>
        <a href="requests.html" class="nav-item" title="Αιτήματα"><img src="../icons/request.svg" class="nav-icon"></a>
        <a href="calculator.html" class="nav-item active" title="Υπολογισμός Προσφοράς"><img src="../icons/calculator.svg" class="nav-icon"></a>
        <div class="user-menu-container" style="margin-top: auto;">
            <div id="logout-popover" class="logout-popover hidden">
                <button onclick="handleLogout()" class="logout-btn">Έξοδος</button>
            </div>
            <div class="nav-item" onclick="toggleLogoutMenu(event)" title="Λογαριασμός" style="cursor:pointer; margin-bottom:0;">
                <img src="../icons/account.svg" class="nav-icon">
            </div>
        </div>
    </div>

    <div class="main-wrapper">

        <main class="content">
            <div class="form-container">

                <h2>Υπολογισμός Προσφοράς</h2>

                <div class="form-group">
            

                    <label class="field-title" for="eventSelect">Επιλέξτε εκδήλωση:</label>
                    <select class="input-select" id="eventSelect" name="eventSelect">
                        <option value="" disabled selected>-- Επιλογή Εκδήλωσης --</option>
                        <option value="Event 1">GreenPlanet</option>
                        <option value="Event 2">BrightStep AE</option>
                        <option value="Event 3">GlobalTech Solutions</option>
                    </select>
                </div>



                <div class="form-group">
                    <label class="field-title">Ημερομηνία:</label>
                    <input type="text" id="eventDate" placeholder="ΗΗ/ΜΜ/ΕΕΕΕ" maxlength="10" class="input-date">

                    <div class="time-row">

                        <div>
                            <label class="field-title">Έναρξη:</label>
                            <input type="text" id="startTime" placeholder="00:00" maxlength="5" class="input-time">
                        </div>

                        <div>
                            <label class="field-title">Λήξη:</label>
                            <input type="text" id="endTime" placeholder="00:00" maxlength="5" class="input-time">

                        </div>

                    </div>

                </div>
                <div class="form-group">

                    <label class="field-title" for="orgType">Είδος φορέα:</label>

                   <select class="input-select" id="orgType" name="orgType">
                        <option value="">-- Επίλεξε Είδος Φορέα --</option>
                        <option value="ΜΚΟ">ΜΚΟ</option>
                        <option value="Small Business">Μικρή Επιχείρηση</option>
                        <option value="Corporate">Μεγάλη Επιχείρηση</option>
                    </select>

                </div>

                <div class="checkbox-row">
                    <label class="checkbox-item">
                        <!-- Προσθήκη της κλάσης custom-tick εδώ -->
                        <input type="checkbox" id="communityPartner" class="custom-tick"> 
                        <span>Community Partner</span>
                    </label>

                    
                    <label class="checkbox-item">
                        <!-- Προσθήκη της κλάσης custom-tick εδώ -->
                        <input type="checkbox" id="minyHub" class="custom-tick"> 
                        <span>Mini Hub</span>
                    </label>
                </div>

               <div class="result-row">

    <div class="calc-check-wrapper" onclick="calculateOffer()">

        <img src="../icons/checkbox.svg" alt="Calculate" class="calc-icon">

    </div>


        <div class="amount-wrapper">
            <label class="field-title">Τελικό Ποσό:</label>
            <input type="text" id="finalAmount" class="input-amount" placeholder="0,00€" readonly>
        </div>

    </div>
            </div>
        </main>
    </div>

    <script src="../js/calculator.js"></script>
    <script src="../js/script.js"></script>

</body>

</html>
