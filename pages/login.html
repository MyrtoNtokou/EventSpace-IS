<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/loginStyle.css">
<body>

  <div class="login-wrapper">
    <div class="login-container">
      <h2>Είσοδος</h2>

      <form id="loginForm">
        <div class="form-group">
          <label class="field-title">USERNAME</label>
          <input type="text" id="username" class="input-full">
        </div>

        <div class="form-group">
          <label class="field-title">PASSWORD</label>
          <input type="password" id="password" class="input-full">
        </div>

        <div class="checkbox-item" style="margin-bottom: 30px;">
          <input type="checkbox" id="remember">
          <label for="remember" style="cursor:pointer;">Remember me</label>
        </div>

        <!-- Το κουμπί Login -->
        <button type="button" onclick="checkLogin()" class="login-submit-btn">
                    Log in
                </button>
      </form>
    </div>
  </div>

<script src="../js/login.js"></script>

</body>
</html>
