<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Login - EventSpace</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/loginStyle.css">
<body>

  <div class="login-wrapper">
    <div class="login-container">
      <h2>Είσοδος</h2>

      <form>
        <div class="form-group">
          <label class="field-title">USERNAME</label>
          <input type="text" class="input-full">
        </div>

        <div class="form-group">
          <label class="field-title">PASSWORD</label>
          <input type="password" class="input-full">
        </div>

        <div class="checkbox-item" style="margin-bottom: 30px;">
          <input type="checkbox" id="remember">
          <label for="remember" style="cursor:pointer;">Remember me</label>
        </div>

        <!-- Το κουμπί Login -->
        <a href="homepage.html" class="login-submit-btn">
            Log in
        </a>
      </form>
    </div>
  </div>

</body>
</html>
