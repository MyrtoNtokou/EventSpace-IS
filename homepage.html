<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Interface</title>
    <style>
        :root {
            --bg-color: #f2f1ec;
            --sidebar-text: #76aab4;
            --main-accent: #76aab4;
            --card-bg: #ffffff;
            --today-item-bg: #d9e9e9;
            --calendar-blue: #0056b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            color: #444;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: white;
            border-radius: 40px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-right: 20px;
        }

        .sidebar nav a {
            display: block;
            text-decoration: none;
            color: var(--sidebar-text);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 35px;
        }

        .sidebar nav a.bottom {
            margin-top: auto;
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-header {
            background: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 28px;
            color: var(--sidebar-text);
            font-weight: bold;
        }

        /* Top Row Cards */
        .top-row {
            display: flex;
            gap: 20px;
        }

        .notifications-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .bubble-container {
            position: relative;
        }

        .label {
            background-color: var(--main-accent);
            color: white;
            padding: 5px 25px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-left: 20px;
            margin-bottom: -15px;
            position: relative;
            z-index: 2;
        }

        .bubble-content {
            background: white;
            border: 3px solid var(--main-accent);
            border-radius: 40px;
            padding: 15px 30px;
            font-size: 22px;
            z-index: 1;
        }

        /* Calendar Widget Mockup */
        .calendar-card {
            background: white;
            border: 3px solid var(--main-accent);
            border-radius: 30px;
            padding: 20px;
            width: 350px;
            text-align: center;
        }

        /* Today Section */
        .today-section {
            background: white;
            border-radius: 40px;
            padding: 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .today-title {
            color: var(--sidebar-text);
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .event-item {
            background-color: var(--today-item-bg);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-info h3 { margin: 0; font-size: 22px; color: #333; }
        .event-info p { margin: 5px 0 0 0; font-size: 18px; color: #555; }

        .mini-hub {
            background-color: #a4c7cc;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 22px;
            color: #333;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <nav>
            <a href="#">Ημερολόγιο</a>
            <a href="#">Αιτήματα</a>
            <a href="#">Υπολογισμός προσφοράς</a>
        </nav>
        <nav style="margin-top: auto;">
            <a href="#" class="bottom">Λογαριασμός</a>
        </nav>
    </div>

    <div class="main-content">
        
        <div class="welcome-header">Καλώς ήρθατε</div>

        <div class="top-row">
            <div class="notifications-panel">
                <div class="bubble-container">
                    <div class="label">Inbox</div>
                    <div class="bubble-content">Έχετε 5 νέα αιτήματα</div>
                </div>
                <div class="bubble-container">
                    <div class="label">Προσφορά</div>
                    <div class="bubble-content">Εκκρεμούν 3 events</div>
                </div>
            </div>

            <div class="calendar-card">
                <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px;">
                    <span>Μάιος 2026</span>
                    <span>&lt; &gt;</span>
                </div>
                <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <tr><th>Κ</th><th>Δ</th><th>Τ</th><th>Τ</th><th>Π</th><th>Π</th><th>Σ</th></tr>
                    <tr><td>26</td><td>27</td><td style="background: var(--calendar-blue); color: white; border-radius: 50%;">28</td><td>29</td><td>30</td><td>1</td><td>2</td></tr>
                    <tr><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
                    </table>
            </div>
        </div>

        <div class="today-section">
            <div class="today-title">Today</div>
            
            <div class="event-item">
                <div class="event-info">
                    <h3>Εταιρεία ΑΒΓ ΑΕ</h3>
                    <p>17:30</p>
                </div>
                <div class="mini-hub">Mini hub</div>
            </div>

            <div class="event-item">
                <div class="event-info">
                    <h3>Γιάννης Παπαδόπουλος</h3>
                    <p>Ώρα: 19:00</p>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
