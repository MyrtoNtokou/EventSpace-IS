<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="homepageStyle.css">
</head>
<body>

    <div class="sidebar">
        <nav>
            <a href="#">Ημερολόγιο</a>
            <a href="#">Αιτήματα</a>
            <a href="#">Υπολογισμός προσφοράς</a>
        </nav>
        <nav style="margin-top: auto;">
            <a href="#" class="bottom">Λογαριασμός</a>
        </nav>
    </div>

    <div class="main-content">
        
        <div class="welcome-header">Καλώς ήρθατε</div>

        <div class="top-row">
            <div class="notifications-panel">
                <div class="bubble-container">
                    <div class="label">Inbox</div>
                    <div class="bubble-content">Έχετε 5 νέα αιτήματα</div>
                </div>
                <div class="bubble-container">
                    <div class="label">Προσφορά</div>
                    <div class="bubble-content">Εκκρεμούν 3 events</div>
                </div>
            </div>

            <div class="calendar-card">
                <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px;">
                    <span id="monthYear"></span>
                    <span>
                        <button onclick="changeMonth(-1)">&lt;</button>
                        <button onclick="changeMonth(1)">&gt;</button>
                    </span>
                </div>

                <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <thead>
                        <tr>
                            <th>Κ</th><th>Δ</th><th>Τ</th><th>Τ</th><th>Π</th><th>Π</th><th>Σ</th>
                        </tr>
                    </thead>
                    <tbody id="calendarBody"></tbody>
                </table>
            </div>
        </div>

        <div class="today-section">
            <div class="today-title">Today</div>
            
            <div class="event-item">
                <div class="event-info">
                    <h3>Εταιρεία ΑΒΓ ΑΕ</h3>
                    <p>17:30</p>
                </div>
                <div class="mini-hub">Mini hub</div>
            </div>

            <div class="event-item">
                <div class="event-info">
                    <h3>Γιάννης Παπαδόπουλος</h3>
                    <p>Ώρα: 19:00</p>
                </div>
            </div>
        </div>

    </div>
    <script src="homepageScript.js"></script>

</body>
</html>
